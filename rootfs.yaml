{{- $rootfs:= or .rootfs "mobuntu-rootfs-sdm845.tar.gz" -}}

architecture: arm64

actions:
  - action: debootstrap
    suite: resolute
    components:
      - main
      - universe
      - multiverse
    mirror: http://ports.ubuntu.com/ubuntu-ports
    variant: minbase
    keyring-file: /usr/share/keyrings/ubuntu-archive-keyring.gpg

  - action: apt
    packages: [ca-certificates, locales-all, dialog, nano, curl, wget, apt-utils, netplan.io, git, man-db, bash-completion, kmod, busybox-initramfs, cpio, initramfs-tools, initramfs-tools-bin, initramfs-tools-core, sudo, systemd, systemd-sysv, gdisk, parted, linux-base, util-linux, rfkill, file, findutils, ntpsec, bc, net-tools, network-manager, modemmanager, bluez, gnupg2, blueman, bluez, binutils, rsync, qrtr-tools, rmtfs, protection-domain-mapper, qcom-phone-utils, tqftpserv, hexagonrpcd, abootimg, linux-firmware-qualcomm-graphics, linux-firmware-qualcomm-misc, linux-firmware-qualcomm-wireless, extrepo, zstd, zarchive-tools, pipewire*, alsa*]

  - action: run
    chroot: true
    script: scripts/setup-user.sh

  - action: run
    chroot: true
    command: extrepo enable mobian

  - action: pack
    description: Create root filesystem tarball
    file: {{ $rootfs }}
    compression: gz
