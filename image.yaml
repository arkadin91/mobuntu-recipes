{{- $image := or .image "mobuntu-sdm845.img" -}}
{{- $rootfs:= or .rootfs "mobuntu-rootfs-sdm845.tar.gz" -}}
{{- $environment := or .environment "ubuntu-desktop" -}}

architecture: arm64

actions:
  - action: unpack
    description: Unpack root filesystem
    compression: gz
    file: {{ $rootfs }}

  - action: overlay
    source: overlays
    destination: /

  - action: recipe
    recipe: packages/packages-{{ $environment }}.yaml

  - action: image-partition
    description: Creating image
    imagename: {{ $image }}
    imagesize: 10GB
    partitiontype: gpt
    mountpoints:
      - mountpoint: /boot/efi
        partition: esp
      - mountpoint: /
        partition: mobuntu
    partitions:
      - name: esp
        fs: fat32
        start: 0MB
        end: 512MB
      - name: mobuntu
        fs: ext4
        start: 512MB
        end: 100%

  - action: filesystem-deploy
    description: Deploying filesystem into image
    
  - action: run
    chroot: true
    script: scripts/update-apt.sh

  - action: overlay
    source: files
    destination: /opt/
    
  - action: run
    chroot: true
    script: scripts/final.sh
    
  - action: run
    description: Pull out rootfs image
    postprocess: true
    command: dd if={{ $image }}p1 of=esp-{{ $image }} && dd if={{ $image }}p2 of=root-{{ $image }} 
